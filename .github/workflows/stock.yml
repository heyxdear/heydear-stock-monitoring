name: Printeers Stock Monitoring

on:
  workflow_dispatch:        # triggered punctually by the Cloudflare Worker (cron) via API

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run daily stock report (idempotent)
        env:
          PRINTEERS_SECRET_KEY: ${{ secrets.PRINTEERS_SECRET_KEY }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
          PRINTEERS_ENV:         ${{ secrets.PRINTEERS_ENV }}
          SLACK_BOT_NAME:        ${{ secrets.SLACK_BOT_NAME }}
          SLACK_BOT_ICON:        ${{ secrets.SLACK_BOT_ICON }}
          GITHUB_TOKEN:          ${{ github.token }}
          GITHUB_REPO:           ${{ github.repository }}
        run: python3 stock_report.py --backup
