name: Printeers Stock Monitoring

on:
  schedule:
    - cron: '17 4 * * *'    # daily 04:17 UTC = 06:17 Berlin (summer); off-peak minute
    - cron: '17 5 * * 1'    # Monday 05:17 UTC = 07:17 Berlin (summer)
    - cron: '7 12 * * *'    # TEMP TEST RUN 12:07 UTC — remove after testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule != '17 5 * * 1')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run daily stock report
        env:
          PRINTEERS_SECRET_KEY: ${{ secrets.PRINTEERS_SECRET_KEY }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
          PRINTEERS_ENV:         ${{ secrets.PRINTEERS_ENV }}
          SLACK_BOT_NAME:        ${{ secrets.SLACK_BOT_NAME }}
          SLACK_BOT_ICON:        ${{ secrets.SLACK_BOT_ICON }}
        run: python3 stock_report.py --post
      - name: Commit today's snapshot
        run: |
          git config user.name  "stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git add snapshots/
          git commit -m "snapshot $(date +%F)" || echo "no changes"
          git push

  weekly:
    if: github.event_name == 'schedule' && github.event.schedule == '17 5 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run weekly stock balance
        env:
          PRINTEERS_SECRET_KEY: ${{ secrets.PRINTEERS_SECRET_KEY }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
          PRINTEERS_ENV:         ${{ secrets.PRINTEERS_ENV }}
          SLACK_BOT_NAME:        ${{ secrets.SLACK_BOT_NAME }}
          SLACK_BOT_ICON:        ${{ secrets.SLACK_BOT_ICON }}
        run: python3 stock_report.py --weekly --no-save --post
