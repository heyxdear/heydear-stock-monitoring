name: Printeers Stock Monitoring

on:
  schedule:
    - cron: '5 4 * * *'    # daily 04:05 UTC = 06:05 Berlin (summer) — single morning run
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Run daily stock report
        env:
          PRINTEERS_SECRET_KEY: ${{ secrets.PRINTEERS_SECRET_KEY }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_WEBHOOK_URL }}
          PRINTEERS_ENV:         ${{ secrets.PRINTEERS_ENV }}
          SLACK_BOT_NAME:        ${{ secrets.SLACK_BOT_NAME }}
          SLACK_BOT_ICON:        ${{ secrets.SLACK_BOT_ICON }}
        run: python3 stock_report.py --post
      - name: Commit today's snapshot
        run: |
          git config user.name  "stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git add snapshots/
          git commit -m "snapshot $(date +%F)" || echo "no changes"
          git push
